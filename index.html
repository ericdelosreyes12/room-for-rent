<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eric Delos Reyes Room Rental</title>

  <link rel="stylesheet" href="style.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>

  <!-- Floating Animated Background -->
  <div class="floating floating1"></div>
  <div class="floating floating2"></div>
  <div class="floating floating3"></div>

  <header>
    <h1 class="fade-in">Affordable Rooms for Rent</h1>
    <p class="fade-in-delay">Comfortable • Secure • Accessible</p>
  </header>

  <nav>
    <a href="#rooms">Rooms</a>
    <a href="#tour">Virtual Tour</a>
    <a href="#location">Location</a>
    <a href="#reserve">Reserve</a>
  </nav>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-content slide-up">
      <h2>Your Next Home Awaits</h2>
      <p>Modern, clean, and affordable rooms available today.</p>

      <a href="#reserve" class="btn pulse-btn">
        Reserve Now
      </a>
    </div>
  </section>

  <!-- ROOMS -->
  <section id="rooms" class="section">
    <h2 class="section-title">Available Rooms</h2>

    <div class="room-grid">

      <div class="room-card zoom-hover">
        <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop" alt="Room 1">

        <div class="room-info">
          <h3>Single Room</h3>
          <p class="price">₱4,500/month</p>
          <p>Fully furnished with cabinet, bed, and fan.</p>
        </div>
      </div>

      <div class="room-card zoom-hover">
        <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop" alt="Room 2">

</html>
